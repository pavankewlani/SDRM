{% extends 'base.html' %}
{% block title %}Verify OTP — Aetheria{% endblock %}
{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center;">
  
  <div class="cuboid-hover" style="width: 100%; max-width: 440px;">
    <div class="auth-card cuboid-card" style="padding: 3rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(99,102,241,0.15);">
      
      <div class="auth-header" style="text-align: center; margin-bottom: 2.5rem;">
        <div class="icon-3d" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, var(--accent), var(--purple)); border: none; box-shadow: 0 10px 30px var(--accent-glow);">
          <i data-lucide="key" style="color: white; width: 32px; height: 32px;"></i>
        </div>
        <h2 style="font-size: 1.7rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem;">Verify OTP</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Enter the 6-digit code sent to<br><strong>{{ email }}</strong></p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="position: relative; margin-bottom: 2rem;">
          <label for="otp">One-Time Password</label>
          <div style="position: relative;">
            <i data-lucide="shield" style="position: absolute; left: 1rem; top: 1.15rem; width: 18px; color: var(--text-muted);"></i>
            <input type="text" id="otp" name="otp" placeholder="Enter 6-digit OTP" required maxlength="6" pattern="\d{6}" style="padding-left: 3rem; background: rgba(255,255,255,0.03); letter-spacing: 0.5rem; text-align: center; font-weight: 800; font-size: 1.2rem;" />
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large" style="width: 100%; border-radius: 999px;">
          Verify OTP <i data-lucide="check-circle" style="width: 18px;"></i>
        </button>
      </form>

      <div class="auth-footer" style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
        Didn't receive the code? <a href="{% url 'forgot_password' %}" style="color: var(--accent-light); text-decoration: none; font-weight: 600;">Resend Email</a>
      </div>
    </div>
  </div>

</div>
{% endblock %}
