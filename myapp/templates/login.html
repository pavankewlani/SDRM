{% extends 'base.html' %}
{% block title %}Login — Aetheria{% endblock %}
{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center;">
  
  <div class="cuboid-hover" style="width: 100%; max-width: 440px;">
    <div class="auth-card cuboid-card" style="padding: 3rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(99,102,241,0.15);">
      
      <div class="auth-header" style="text-align: center; margin-bottom: 2.5rem;">
        <div class="icon-3d" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, var(--accent), var(--purple)); border: none; box-shadow: 0 10px 30px var(--accent-glow);">
          <i data-lucide="shield-check" style="color: white; width: 32px; height: 32px;"></i>
        </div>
        <h2 style="font-size: 1.7rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem;">Welcome Back</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Sign in to your Aetheria account</p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="position: relative;">
          <label for="username">Username</label>
          <div style="position: relative;">
            <i data-lucide="user" style="position: absolute; left: 1rem; top: 1.15rem; width: 18px; color: var(--text-muted);"></i>
            <input type="text" id="username" name="username" placeholder="Enter your username" required style="padding-left: 3rem; background: rgba(255,255,255,0.03);" />
          </div>
        </div>
        
        <div class="form-group" style="position: relative; margin-bottom: 2rem;">
          <label for="password">Password</label>
          <div style="position: relative;">
            <i data-lucide="lock" style="position: absolute; left: 1rem; top: 1.15rem; width: 18px; color: var(--text-muted);"></i>
            <input type="password" id="password" name="password" placeholder="Enter your password" required style="padding-left: 3rem; background: rgba(255,255,255,0.03);" />
          </div>
          <div style="text-align: right; margin-top: 0.5rem;">
            <a href="{% url 'forgot_password' %}" style="color: var(--accent-light); text-decoration: none; font-size: 0.85rem; font-weight: 500;">Forgot password?</a>
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large" style="width: 100%; border-radius: 999px;">
          <i data-lucide="log-in" style="width: 18px;"></i> Sign In
        </button>
      </form>

      <div class="auth-footer" style="text-align: center; margin-top: 2rem; color: var(--text-secondary); font-size: 0.9rem;">
        Don't have an account? <a href="{% url 'register' %}" style="color: var(--accent-light); text-decoration: none; font-weight: 600;">Create one securely</a>
      </div>
    </div>
  </div>

</div>
{% endblock %}
