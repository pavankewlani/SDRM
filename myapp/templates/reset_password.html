{% extends 'base.html' %}
{% block title %}Reset Password — Aetheria{% endblock %}
{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center;">
  
  <div class="cuboid-hover" style="width: 100%; max-width: 440px;">
    <div class="auth-card cuboid-card" style="padding: 3rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(99,102,241,0.15);">
      
      <div class="auth-header" style="text-align: center; margin-bottom: 2.5rem;">
        <div class="icon-3d" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, var(--accent), var(--purple)); border: none; box-shadow: 0 10px 30px var(--accent-glow);">
          <i data-lucide="refresh-cw" style="color: white; width: 32px; height: 32px;"></i>
        </div>
        <h2 style="font-size: 1.7rem; font-weight: 800; letter-spacing: -0.04em; margin-bottom: 0.5rem;">Set New Password</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Please choose a strong password</p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="form-group" style="position: relative;">
          <label for="password">New Password</label>
          <div style="position: relative;">
            <i data-lucide="lock" style="position: absolute; left: 1rem; top: 1.15rem; width: 18px; color: var(--text-muted);"></i>
            <input type="password" id="password" name="password" placeholder="Minimum 8 characters" required minlength="8" style="padding-left: 3rem; background: rgba(255,255,255,0.03);" />
          </div>
        </div>
        
        <div class="form-group" style="position: relative; margin-bottom: 2rem;">
          <label for="password2">Confirm New Password</label>
          <div style="position: relative;">
            <i data-lucide="check" style="position: absolute; left: 1rem; top: 1.15rem; width: 18px; color: var(--text-muted);"></i>
            <input type="password" id="password2" name="password2" placeholder="Repeat your new password" required style="padding-left: 3rem; background: rgba(255,255,255,0.03);" />
          </div>
        </div>
        
        <button type="submit" class="btn btn-primary btn-large" style="width: 100%; border-radius: 999px;">
          Update Password <i data-lucide="save" style="width: 18px;"></i>
        </button>
      </form>

    </div>
  </div>

</div>
{% endblock %}
