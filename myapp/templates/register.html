{% extends 'base.html' %}
{% block title %}Register — Aetheria{% endblock %}
{% block content %}
<div class="auth-container" style="min-height: calc(100vh - 180px); display: flex; align-items: center; justify-content: center; padding: 2rem 0;">
  
  <div class="cuboid-hover" style="width: 100%; max-width: 500px;">
    <div class="auth-card cuboid-card" style="padding: 3.5rem; background: var(--bg-card); border: 1px solid var(--border); border-radius: 28px; box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 40px rgba(99,102,241,0.15);">
      
      <div class="auth-header" style="text-align: center; margin-bottom: 3rem;">
        <div class="icon-3d" style="width: 64px; height: 64px; margin: 0 auto 1.5rem; background: linear-gradient(135deg, var(--accent), var(--cyan)); border: none; box-shadow: 0 10px 30px rgba(6,182,212,0.3); display: flex; align-items: center; justify-content: center;">
          <i data-lucide="user-plus" style="color: white; width: 32px; height: 32px;"></i>
        </div>
        <h2 style="font-size: 1.8rem; font-weight: 850; letter-spacing: -0.04em; margin-bottom: 0.5rem;">Create Account</h2>
        <p style="color: var(--text-secondary); font-size: 0.95rem;">Join Aetheria for free student risk analysis</p>
      </div>

      <form method="POST">
        {% csrf_token %}
        <div class="form-group">
          <label for="username">Username</label>
          <input type="text" id="username" name="username" placeholder="Choose a username" required />
        </div>
        <div class="form-group">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" placeholder="name@example.com" required />
        </div>
        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" placeholder="Min. 8 characters" required />
        </div>
        <div class="form-group">
          <label for="password2">Confirm Password</label>
          <input type="password" id="password2" name="password2" placeholder="Repeat your password" required />
        </div>
        
        <button type="submit" class="btn btn-primary btn-large" style="width: 100%; border-radius: 999px; margin-top: 1.5rem;">
          <i data-lucide="arrow-right" style="width: 18px;"></i> Sign Up Now
        </button>
      </form>

      <div class="auth-footer" style="text-align: center; margin-top: 2.5rem; color: var(--text-secondary); font-size: 0.95rem; border-top: 1px solid var(--border); padding-top: 2rem;">
        Already have an account? <a href="{% url 'login' %}" style="color: var(--accent-light); text-decoration: none; font-weight: 600;">Sign In Instead</a>
      </div>
    </div>
  </div>

</div>

<style>
  /* Fix Django Form styling embedded from crisp-forms or basic formatting */
  form p { margin-bottom: 1.5rem; position: relative; }
  form label { display: block; margin-bottom: 0.5rem; font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
  form input[type="text"], form input[type="password"], form input[type="email"] {
    width: 100%;
    padding: 1rem 1.25rem;
    background: rgba(255,255,255,0.03);
    border: 1px solid var(--border-bright);
    border-radius: var(--radius-sm);
    color: white;
    font-size: 1rem;
    transition: all 0.2s;
  }
  form input:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 0 3px rgba(99,102,241,0.2); }
  .helptext { font-size: 0.8rem; color: var(--text-muted); display: block; margin-top: 0.5rem; }
  ul.errorlist { list-style: none; color: #fca5a5; font-size: 0.85rem; padding: 0.5rem 0; margin: 0; }
</style>
{% endblock %}
